<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analizador de Imágenes con Puter</title>
  <script src="https://js.puter.com/v2/"></script>
</head>
<body>
  <h2>Analizador de Imágenes con Puter</h2>

  <label>Escribe tu prompt:</label><br>
  <input type="text" id="promptBox" placeholder="Escribe aquí..."><br><br>

  <label>Adjuntar imagen:</label><br>
  <input type="file" id="imageUpload"><br><br>

  <button id="sendBtn">Enviar</button><br><br>

  <label>Respuesta del modelo:</label><br>
  <textarea id="responseBox" rows="5" cols="50"></textarea><br><br>

  <label>Logs:</label><br>
  <textarea id="logsBox" rows="5" cols="50"></textarea>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const promptBox = document.getElementById("promptBox");
    const responseBox = document.getElementById("responseBox");
    const logsBox = document.getElementById("logsBox");

    sendBtn.addEventListener("click", async () => {
      const prompt = promptBox.value.trim();
      if (!prompt) {
        logsBox.value += "No se ingresó ningún prompt\n";
        return;
      }

      logsBox.value += `Consultando modelo con: ${prompt}\n`;

      try {
        const response = await puter.ai.chat(prompt, { model: "gpt-5-nano" });
        responseBox.value = response;
        logsBox.value += "Respuesta recibida\n";
      } catch (err) {
        logsBox.value += "Error: " + err.message + "\n";
      }

      // Limpiar la caja de prompt después de enviar
      promptBox.value = "";
    });
  </script>
</body>
</html>
