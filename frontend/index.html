<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analizador de Imágenes con Puter</title>
  <script src="https://js.puter.com/v2/"></script>
</head>
<body>
  <h2>Analizador de Imágenes con Puter</h2>

  <label>Escribe tu prompt:</label><br>
  <input type="text" id="promptBox" placeholder="Escribe aquí..."><br><br>

  <label>Adjuntar imagen:</label><br>
  <input type="file" id="imageUpload"><br><br>

  <button id="sendBtn">Enviar</button><br><br>

  <label>Respuesta del modelo:</label><br>
  <textarea id="responseBox" rows="5" cols="50"></textarea><br><br>

  <label>Logs:</label><br>
  <textarea id="logsBox" rows="5" cols="50"></textarea>

  <script>
    const sendBtn = document.getElementById("sendBtn");
    const promptBox = document.getElementById("promptBox");
    const imageUpload = document.getElementById("imageUpload");
    const responseBox = document.getElementById("responseBox");
    const logsBox = document.getElementById("logsBox");

    sendBtn.addEventListener("click", async () => {
      const prompt = promptBox.value.trim();
      const file = imageUpload.files[0];

      // Construir input dinámico
      const input = [];
      if (prompt) input.push(prompt);
      if (file) {
        const base64 = await toBase64(file);
        input.push({ type: "image", data: base64 });
      }

      if (input.length === 0) {
        logsBox.value += "No se ingresó prompt ni imagen\n";
        return;
      }

      logsBox.value += "Enviando al modelo...\n";

      try {
        const response = await puter.ai.run({
          model: "google/gemini-2.5-flash",
          input: input
        });
        responseBox.value = response.output_text;
        logsBox.value += "Respuesta recibida\n";
      } catch (err) {
        logsBox.value += "Error: " + err.message + "\n";
      }

      // Limpiar prompt después de enviar
      promptBox.value = "";
    });

    // Función auxiliar para convertir archivo a base64
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }
  </script>
</body>
</html>
