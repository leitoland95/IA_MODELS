<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Frontend AI Vision con Logs Backend</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 150px; margin-top: 10px; }
    input, button { margin-top: 10px; display: block; }
    #logs { background: #f4f4f4; padding: 10px; margin-top: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Analizador de Imágenes con Puter</h1>

  <!-- Prompt -->
  <label for="prompt">Escribe tu prompt:</label>
  <input type="text" id="prompt" placeholder="Ej: Describe esta imagen en detalle">

  <!-- Imagen -->
  <label for="imageInput">Adjuntar imagen:</label>
  <input type="file" id="imageInput" accept="image/*">

  <!-- Botón -->
  <button onclick="enviar()">Enviar</button>

  <!-- Respuesta -->
  <h3>Respuesta del modelo:</h3>
  <textarea id="responseBox" readonly></textarea>

  <!-- Logs -->
  <h3>Logs:</h3>
  <div id="logs"></div>

  <script type="module">
    import puter from "https://cdn.jsdelivr.net/npm/puter-js@latest/dist/puter.min.js";

    async function enviar() {
      const prompt = document.getElementById("prompt").value;
      const fileInput = document.getElementById("imageInput");
      const responseBox = document.getElementById("responseBox");
      const logs = document.getElementById("logs");

      let images = [];

      // Si el usuario adjunta una imagen, convertirla a base64
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const base64 = await toBase64(file);
        images.push({ data: base64 });
        logs.innerHTML += `<p>Imagen adjunta: ${file.name}</p>`;
      } else {
        logs.innerHTML += `<p>No se adjuntó imagen</p>`;
      }

      logs.innerHTML += `<p>Prompt enviado: "${prompt}"</p>`;

      try {
        const reply = await puter.ai.chat({
          model: "google/gemini-2.5-flash",
          messages: [{ role: "user", content: prompt }],
          images: images
        });

        const respuesta = reply.choices[0].message.content;
        responseBox.value = respuesta;

        logs.innerHTML += `<p>Respuesta recibida: ${respuesta}</p>`;
        console.log("Respuesta completa:", reply);

        // Enviar log al backend (solo timestamp, prompt y respuesta)
        await fetch("/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: prompt,
            response: respuesta
          })
        });
      } catch (err) {
        responseBox.value = "Error: " + err.message;
        logs.innerHTML += `<p>Error: ${err.message}</p>`;
        console.error("Error:", err);
      }
    }

    // Función para convertir archivo a base64
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
